<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba EmailJS - Tera Solutions</title>
</head>
<body>
    <h1>Prueba de EmailJS</h1>
    <p>Esta página te ayuda a verificar que tu configuración de EmailJS funcione correctamente.</p>

    <button onclick="testEmailJS()">Probar EmailJS</button>

    <div id="result"></div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        function testEmailJS() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '🔄 Probando EmailJS...';

            // Verificar que EmailJS esté cargado
            if (typeof emailjs === 'undefined') {
                resultDiv.innerHTML = '❌ Error: EmailJS no está cargado. Verifica tu conexión a internet.';
                return;
            }

            // Configuración
            const serviceID = 'service_oje2bqx';
            const templateID = 'template_c3mdljv';
            const publicKey = 'jHNxtH2Vwq2nYItD3';

            console.log('Iniciando prueba de EmailJS...');

            try {
                // Inicializar EmailJS
                emailjs.init(publicKey);
                console.log('EmailJS inicializado');

                // Datos de prueba
                const templateParams = {
                    from_name: 'Prueba Tera Solutions',
                    from_email: 'test@example.com',
                    company: 'Empresa de Prueba',
                    service: 'Desarrollo Web',
                    message: 'Este es un mensaje de prueba para verificar que EmailJS funcione correctamente.',
                    to_email: 'raydelcomas1991@gmail.com'
                };

                console.log('Enviando email de prueba...');

                emailjs.send(serviceID, templateID, templateParams)
                    .then(function(response) {
                        console.log('✅ Email enviado exitosamente:', response);
                        resultDiv.innerHTML = `
                            <div style="color: green; padding: 10px; border: 1px solid green; border-radius: 5px;">
                                ✅ ¡Éxito! Email enviado correctamente.<br>
                                Revisa tu bandeja de entrada: raydelcomas1991@gmail.com<br>
                                <strong>Respuesta:</strong> ${JSON.stringify(response)}
                            </div>
                        `;
                    })
                    .catch(function(error) {
                        console.error('❌ Error al enviar email:', error);
                        resultDiv.innerHTML = `
                            <div style="color: red; padding: 10px; border: 1px solid red; border-radius: 5px;">
                                ❌ Error al enviar el email.<br>
                                <strong>Error:</strong> ${error.text || error.message || 'Error desconocido'}<br>
                                <strong>Detalles:</strong> ${JSON.stringify(error)}
                            </div>
                        `;
                    });

            } catch (error) {
                console.error('Error de inicialización:', error);
                resultDiv.innerHTML = `
                    <div style="color: red; padding: 10px; border: 1px solid red; border-radius: 5px;">
                        ❌ Error de inicialización: ${error.message}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
